# SERVER WEB
server.port=8080

# CONEXION A LA BASE DE DATOS ORIGINAL ("techgamers_db")
spring.datasource.url=jdbc:mysql://localhost:3306/techgamers_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=techgamers_user
spring.datasource.password=TechGamers2026!

# HIBERNATE (ORM)
# IMPORTANTE: Se usa 'none' o 'update' para alinear automáticamente cualquier diferencia sutil en los nombres de las tablas viejas.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# JSON Y HORARIOS
spring.jackson.time-zone=America/Bogota
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# JWT SECURITY (Clonación de SECRET_KEY original si es posible)
jwt.secret=Gemini_TechGamers_Secret_Key_2026_FullStackECommerce_1234567890
jwt.expiration=86400000

# SUBIDA DE IMÁGENES (Multipart)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
